name: Weekly Hybrid Model Retraining

# Trigger this script every Sunday at 3:00 AM UTC
on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch: # Allows manual execution via the Actions tab

jobs:
  update-data-and-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Grants GitHub Actions token permission to push commits

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pandas scikit-learn kaggle joblib supabase

      - name: Execute ETL and Retraining Pipeline
        env:
          # Ingest TMDB Content Data
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          # Ingest User Interaction Data
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_pipeline.py

      - name: Commit and Push Updated Artifacts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          # Stage both the lightweight dataset and the updated model binaries
          git add data/tmdb_movies_lite.csv models/*.pkl
          
          # Execute commit and push exclusively if dimensional matrices or data have mutated
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated ETL, TMDB update, and hybrid model retraining" && git push)
