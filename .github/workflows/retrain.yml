name: Weekly Hybrid Model Retraining

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

jobs:
  update-data-and-models:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # --- THE FIX: Give GitHub Actions the heavy ML tools it needs ---
          pip install torch pandas scikit-learn kaggle joblib supabase

      - name: Execute ETL and Retraining Pipeline
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/update_pipeline.py

      - name: Commit and Push Updated Artifacts
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/tmdb_movies_lite.csv models/*.pkl
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated ETL, TMDB update, and hybrid model retraining" && git push)
